<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả thi đấu | PHN FC</title>
    <link rel="stylesheet" href="css/shared.css">
    <style>
        .results-category-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            border-bottom: 2px solid #EAECEF;
            padding-bottom: 12px;
        }
        .match-type-btn {
            background: none;
            border: none;
            padding: 8px 16px;
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--text-muted);
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            text-transform: uppercase;
        }
        .match-type-btn:hover {
            color: var(--primary);
        }
        .match-type-btn.active {
            color: var(--primary);
        }
        .match-type-btn.active:after {
            content: '';
            position: absolute;
            bottom: -14px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary-gradient);
            border-radius: 2px;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <header>
        <!-- Tier 1: Deep Crimson utility bar -->
        <div class="header-top">
            <div class="header-top-container">
                <div class="header-top-left">
                    <span>PHÁO HÀ NỘI FOOTBALL CLUB - TRANG WEB CHÍNH THỨC</span>
                </div>
                <div class="header-top-right">
                    <a href="https://www.facebook.com/profile.php?id=61586374958119" class="header-top-link" target="_blank">Facebook</a>
                    <a href="https://www.youtube.com/@PHNFCafchn" class="header-top-link" target="_blank">Youtube</a>
                    <a href="https://www.tiktok.com/@phnfc07" class="header-top-link" target="_blank">TikTok</a>
                    <div class="header-admin-link" id="header-admin-btn" onclick="toggleAdmin()">
                        <img src="assets/images/icondn.jpg" alt="Login" style="pointer-events: none;">
                    </div>
                </div>
            </div>
        </div>
        <!-- Tier 2: Bright Red navigation bar -->
        <div class="header-bottom">
            <div class="header-bottom-container">
                <a href="index.html" class="logo-wrapper">
                    <img src="assets/images/Logph.png" alt="CLB Logo" class="logo-img">
                    <span class="site-name">PHN</span>
                </a>
                <ul class="nav-links">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="players.html" class="nav-link">Cầu thủ</a></li>
                    <li><a href="videos.html" class="nav-link">Video</a></li>
                    <li><a href="results.html" class="nav-link active">Kết quả</a></li>
                    <li><a href="rankings.html" class="nav-link">Xếp hạng</a></li>
                    <li><a href="awards.html" class="nav-link">Giải thưởng</a></li>
                </ul>
                <div class="mobile-toggle" id="mobile-toggle">
                    <i data-lucide="menu"></i>
                </div>
            </div>
        </div>
    </header>

    <section id="results">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 class="section-title" style="margin-bottom: 0;">Kết quả thi đấu</h2>
            <button class="btn-primary admin-only" onclick="openAddMatchModal()"><i data-lucide="plus"></i> Thêm kết quả</button>
        </div>

        <!-- Category selector (Internal vs Friendly) -->
        <div class="results-category-tabs">
            <button class="match-type-btn active" data-type="internal" onclick="changeMatchType('internal')">Thi đấu nội bộ</button>
            <button class="match-type-btn" data-type="friendly" onclick="changeMatchType('friendly')">Thi đấu giao hữu</button>
        </div>

        <div class="match-results-tabs">
            <div class="month-tab active" data-month="1">T1</div>
            <div class="month-tab" data-month="2">T2</div>
            <div class="month-tab" data-month="3">T3</div>
            <div class="month-tab" data-month="4">T4</div>
            <div class="month-tab" data-month="5">T5</div>
            <div class="month-tab" data-month="6">T6</div>
            <div class="month-tab" data-month="7">T7</div>
            <div class="month-tab" data-month="8">T8</div>
            <div class="month-tab" data-month="9">T9</div>
            <div class="month-tab" data-month="10">T10</div>
            <div class="month-tab" data-month="11">T11</div>
            <div class="month-tab" data-month="12">T12</div>
        </div>

        <div id="match-list" class="match-grid">
            <!-- Dynamic Content -->
        </div>
    </section>

    <!-- Modals -->
    <div class="overlay" id="overlay" onclick="closeModal()"></div>
    <div class="modal-admin" id="match-modal">
        <h2>Thêm Kết quả</h2>
        <div class="form-group">
            <label>Loại trận đấu</label>
            <select id="m-type">
                <option value="internal">Thi đấu nội bộ</option>
                <option value="friendly">Thi đấu giao hữu</option>
            </select>
        </div>
        <div class="form-row-grid">
            <div class="form-group">
                <label>Tháng</label>
                <input type="number" id="m-month" min="1" max="12">
            </div>
            <div class="form-group">
                <label>Ngày (dd/mm/yyyy)</label>
                <input type="text" id="m-date" placeholder="Vd: 17/06/2026">
            </div>
        </div>
        <div class="form-row-grid">
            <div class="form-group">
                <label>Đội 1 (Nhà)</label>
                <input type="text" id="m-team-a" placeholder="Vd: PHN Đỏ">
            </div>
            <div class="form-group">
                <label>Tỉ số 1</label>
                <input type="number" id="m-score-a" value="0" min="0">
            </div>
        </div>
        <div class="form-row-grid">
            <div class="form-group">
                <label>Đội 2 (Khách)</label>
                <input type="text" id="m-team-b" placeholder="Vd: PHN Xanh">
            </div>
            <div class="form-group">
                <label>Tỉ số 2</label>
                <input type="number" id="m-score-b" value="0" min="0">
            </div>
        </div>
        <div class="form-group">
            <label>Ghi chú (Sân bãi / Mô tả)</label>
            <input type="text" id="m-note" placeholder="Vd: Sân Đức An">
        </div>
        <button class="btn-primary" onclick="saveMatch()" style="width: 100%;">Lưu</button>
    </div>

    <script src="js/app.js"></script>
    <script>
        let fetchedMatches = [];
        let currentMatchType = 'internal';

        function getTeamAbbreviation(name) {
            if (!name) return "???";
            const cleanName = name.trim().replace(/\s+/g, ' ');
            const words = cleanName.split(' ');
            if (words.length >= 3) {
                return (words[0][0] + words[1][0] + words[2][0]).toUpperCase();
            } else if (words.length === 2) {
                const first = words[0][0] || '';
                const second = words[1].substring(0, 2) || '';
                return (first + second).toUpperCase().padEnd(3, 'X').substring(0, 3);
            } else {
                return cleanName.substring(0, 3).toUpperCase();
            }
        }

        async function fetchMatches(month) {
            const { data, error } = await _supabase.from('match_results').select('*').eq('month', month).order('match_date', { ascending: false });
            if (error) {
                console.error(error);
                fetchedMatches = [];
            } else {
                fetchedMatches = data || [];
            }
            renderMatchList();
        }

        function renderMatchList() {
            const list = document.getElementById('match-list');
            
            // Filter matches locally based on active tab
            const filtered = fetchedMatches.filter(m => {
                const isFriendly = m.status === 'friendly';
                return currentMatchType === 'friendly' ? isFriendly : !isFriendly;
            });

            if (filtered.length === 0) {
                list.innerHTML = `<p style="text-align:center; grid-column: 1/-1; opacity:0.5; padding: 40px 0;">Chưa có dữ liệu trận đấu ${currentMatchType === 'friendly' ? 'giao hữu' : 'nội bộ'} tháng này.</p>`;
                return;
            }

            list.innerHTML = filtered.map(m => {
                const teamA = m.team_a || 'PHN FC';
                const teamB = m.team_b || 'Đối thủ';
                const logoA = getTeamAbbreviation(teamA);
                const logoB = getTeamAbbreviation(teamB);

                // Highlight PHN team logos with club gradient, and others with a dark slate background
                const bgA = logoA === 'PHN' ? 'var(--primary-gradient)' : '#2C3E50';
                const bgB = logoB === 'PHN' ? 'var(--primary-gradient)' : '#2C3E50';

                return `
                <div class="match-card">
                    <div class="match-header">
                        <span>${m.match_date}</span>
                        <span>${currentMatchType === 'friendly' ? 'Giao Hữu' : 'Nội Bộ'}</span>
                    </div>
                    <div class="match-main">
                        <div class="team">
                            <div class="team-logo" style="background:${bgA};">${logoA}</div>
                            <div class="team-name" title="${teamA}">${teamA}</div>
                        </div>
                        <div class="score-display">
                            <div class="score-box">${m.score_a}</div>
                            <span>-</span>
                            <div class="score-box">${m.score_b}</div>
                        </div>
                        <div class="team">
                            <div class="team-logo" style="background:${bgB};">${logoB}</div>
                            <div class="team-name" title="${teamB}">${teamB}</div>
                        </div>
                    </div>
                    <div class="match-footer">${m.note || ''}</div>
                    <button class="del-btn admin-only" onclick="deleteItem('match_results', '${m.id}')" style="margin-top:15px; border-radius:4px; width:100%; justify-content: center; padding: 8px 12px; display: none;">
                        <i data-lucide="trash-2" style="width:14px; height:14px; margin-right:4px;"></i> Xóa trận đấu
                    </button>
                </div>`;
            }).join('');

            if (isAdmin) {
                document.querySelectorAll('.match-card .del-btn').forEach(btn => btn.style.display = 'inline-flex');
            }
            lucide.createIcons();
        }

        function changeMatchType(type) {
            currentMatchType = type;
            document.querySelectorAll('.match-type-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.type === type);
            });
            renderMatchList();
        }

        function openAddMatchModal() {
            if (!isAdmin) { alert('Bạn không có quyền thực hiện hành động này!'); return; }
            const activeTab = document.querySelector('.month-tab.active');
            const activeMonth = activeTab ? parseInt(activeTab.dataset.month) : 1;
            
            // Set defaults
            document.getElementById('m-month').value = activeMonth;
            
            // Format current date as dd/mm/yyyy
            const now = new Date();
            const dd = String(now.getDate()).padStart(2, '0');
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const yyyy = now.getFullYear();
            document.getElementById('m-date').value = `${dd}/${mm}/${yyyy}`;
            
            document.getElementById('m-team-a').value = 'PHN FC';
            document.getElementById('m-score-a').value = '0';
            document.getElementById('m-team-b').value = '';
            document.getElementById('m-score-b').value = '0';
            document.getElementById('m-note').value = '';
            document.getElementById('m-type').value = currentMatchType;
            
            openModal('match');
        }

        async function saveMatch() {
            if (!isAdmin) { alert('Bạn không có quyền thực hiện hành động này!'); return; }
            const month = parseInt(document.getElementById('m-month').value);
            const date = document.getElementById('m-date').value;
            const teamA = document.getElementById('m-team-a').value;
            const scoreA = parseInt(document.getElementById('m-score-a').value);
            const teamB = document.getElementById('m-team-b').value;
            const scoreB = parseInt(document.getElementById('m-score-b').value);
            const note = document.getElementById('m-note').value;
            const type = document.getElementById('m-type').value;

            if (!month || !date || !teamA || !teamB) {
                alert("Vui lòng điền đầy đủ các thông tin bắt buộc!");
                return;
            }

            const payload = {
                month,
                match_date: date,
                team_a: teamA,
                score_a: scoreA,
                team_b: teamB,
                score_b: scoreB,
                note,
                status: type // Storing the match category in status
            };

            const { error } = await _supabase.from('match_results').insert([payload]);
            if (!error) {
                closeModal();
                currentMatchType = type;
                
                // Update match type active tabs
                document.querySelectorAll('.match-type-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.type === type);
                });
                
                // Select active month tab
                document.querySelectorAll('.month-tab').forEach(tab => {
                    tab.classList.toggle('active', parseInt(tab.dataset.month) === month);
                });

                fetchMatches(month);
            } else {
                alert("Lỗi khi thêm trận đấu: " + error.message);
            }
        }

        document.querySelectorAll('.month-tab').forEach(tab => tab.addEventListener('click', () => {
             document.querySelectorAll('.month-tab').forEach(t => t.classList.remove('active'));
             tab.classList.add('active');
             fetchMatches(tab.dataset.month);
        }));

        function renderAll() { 
            const activeTab = document.querySelector('.month-tab.active');
            if(activeTab) fetchMatches(activeTab.dataset.month);
        }
        window.onload = renderAll;
    </script>
</body>

</html>
