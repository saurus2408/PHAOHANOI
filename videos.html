
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video xem lại | PHN FC</title>
    <link rel="stylesheet" href="css/shared.css">
    <style>
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }
        .video-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .video-card:hover { transform: translateY(-5px); }
        .video-thumb {
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
            position: relative;
            cursor: pointer;
        }
        .play-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: var(--transition);
        }
        .video-card:hover .play-overlay { opacity: 1; }
        .video-info { padding: 20px; }
        .video-title { font-weight: 700; font-size: 1.1rem; }
        .cat-tabs { display: flex; gap: 15px; margin-bottom: 30px; }
        .cat-btn {
            padding: 8px 20px;
            border: 1px solid var(--primary);
            border-radius: 20px;
            background: transparent;
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
        }
        .cat-btn.active { background: var(--primary); color: white; }
        .modal-admin {
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 40px; border-radius: 12px; z-index: 2000;
            display: none; width: 90%; max-width: 500px;
        }
        .modal-admin.active { display: block; }
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1500; display: none;
        }
        .overlay.active { display: block; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo-wrapper">
                <img src="assets/images/Logph.png" alt="CLB Logo" class="logo-img">
                <span class="site-name">PHN</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="players.html" class="nav-link">Cầu thủ</a></li>
                <li><a href="videos.html" class="nav-link active">Video</a></li>
                <li><a href="results.html" class="nav-link">Kết quả</a></li>
                <li><a href="rankings.html" class="nav-link">Xếp hạng</a></li>
                <li><a href="awards.html" class="nav-link">Giải thưởng</a></li>
                <div class="header-admin-link" id="header-admin-btn" onclick="toggleAdmin()">
                    <i data-lucide="lock"></i>
                </div>
            </ul>
        </div>
    </header>

    <section id="videos">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <h2 class="section-title" style="margin-bottom: 0;">Video xem lại</h2>
            <button class="btn-primary admin-only" onclick="openModal('video')"><i data-lucide="plus"></i> Thêm Video</button>
        </div>

        <div class="cat-tabs">
            <button class="cat-btn active" data-category="full">Full Match</button>
            <button class="cat-btn" data-category="highlights">Highlights</button>
        </div>

        <div class="video-grid" id="video-grid">
            <!-- Dynamic Content -->
        </div>
    </section>

    <!-- Modals -->
    <div class="overlay" id="overlay" onclick="closeModal()"></div>
    <div class="modal-admin" id="video-modal">
        <h2>Thêm Video</h2>
        <div class="form-group">
            <label>Loại video</label>
            <select id="v-cat">
                <option value="full">Full Match</option>
                <option value="highlights">Highlights</option>
            </select>
        </div>
        <div class="form-group">
            <label>YouTube Video ID</label>
            <input type="text" id="v-id" placeholder="Vd: m1eL12m9aIc">
        </div>
        <div class="form-group">
            <label>Tiêu đề</label>
            <input type="text" id="v-title">
        </div>
        <button class="btn-primary" onclick="saveVideo()" style="width: 100%;">Lưu</button>
    </div>


    <script src="js/app.js"></script>
    <script>
        async function fetchVideos() {
            const { data, error } = await _supabase.from('videos').select('*').order('created_at', { ascending: false });
            if (error) return console.error(error);
            const grid = document.getElementById('video-grid');
            const activeCat = document.querySelector('.cat-btn.active').dataset.category;
            
            grid.innerHTML = data.filter(v => v.category === activeCat).map(v => `
                <div class="video-card">
                    <div class="video-thumb" style="background-image: url('https://img.youtube.com/vi/${v.video_id}/hqdefault.jpg')" onclick="playVideo(this, '${v.video_id}')">
                        <div class="play-overlay"><i data-lucide="play" style="color:white; width:48px; height:48px;"></i></div>
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">${v.title}</h3>
                        <button class="del-btn admin-only" onclick="deleteItem('videos', '${v.id}')" style="margin-top:10px; background:red; color:white; border:none; padding:5px 10px; border-radius:4px;">Xóa</button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function playVideo(el, id) {
            el.innerHTML = `<iframe width="100%" height="200" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        }

        async function saveVideo() {
            const category = document.getElementById('v-cat').value;
            const video_id = document.getElementById('v-id').value;
            const title = document.getElementById('v-title').value;
            const { error } = await _supabase.from('videos').insert([{ category, video_id, title }]);
            if (!error) { closeModal(); fetchVideos(); }
        }

        document.querySelectorAll('.cat-btn').forEach(btn => btn.addEventListener('click', () => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchVideos();
        }));

        function renderAll() { fetchVideos(); }
        window.onload = fetchVideos;
    </script>
</body>
</html>
